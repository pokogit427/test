    <!-- PHOTOS JAVASCRIPT LOGIC -->

    <script>
        const initialPhotosData = [
            
        ];

        let photosData = [];
        let photoSelectedCategory = "ALL";
        let photoActiveSlideId = null;
        let photoUploadedBase64List = []; // 여러 파일을 담기 위한 배열

        document.addEventListener("DOMContentLoaded", () => {
            initializeDatabase();
            renderPhotoArchive();
            setupPhotoVaultListeners();
        });

        function initializeDatabase() {
            const savedPhotos = localStorage.getItem('tactile_photo_vault_db');
            if (savedPhotos) {
                photosData = JSON.parse(savedPhotos);
            } else {
                photosData = JSON.parse(JSON.stringify(initialPhotosData));
                saveToLocalStorage(photosData);
            }
        }

        function compressImage(base64Str, maxWidth = 800, maxHeight = 800, quality = 0.75) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = function() {
                    resolve(base64Str); // 압축 실패 시 원본 반환
                };
            });
        }

        function saveToLocalStorage(data) {
            try {
                localStorage.setItem('tactile_photo_vault_db', JSON.stringify(data));
                return true;
            } catch (e) {
                console.error("Local Storage Error: ", e);
                triggerToast("💾 저장공간 초과! 업로드된 사진들이 너무 커서 일부 최적화에 실패했을 수 있습니다.", "error");
                return false;
            }
        }

        function setupPhotoVaultListeners() {
            const inputUpload = document.getElementById("photo-file-uploader");
            const fileCountIndicator = document.getElementById("file-count-indicator");

            inputUpload.addEventListener("change", (e) => {
                const files = e.target.files;
                photoUploadedBase64List = []; // 초기화

                if (files && files.length > 0) {
                    let loadedCount = 0;
                    fileCountIndicator.textContent = "이미지 변환 및 최적화 중...";
                    
                    Array.from(files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = function(evt) {
                            // 원본 이미지를 받아 800px 크기의 가벼운 JPEG 포맷으로 자동 변환/압축
                            compressImage(evt.target.result, 800, 800, 0.75).then(compressedBase64 => {
                                photoUploadedBase64List.push(compressedBase64);
                                loadedCount++;
                                if (loadedCount === files.length) {
                                    fileCountIndicator.textContent = `${files.length}개의 사진 준비 완료 📸`;
                                    triggerToast(`${files.length}개의 이미지가 로컬 캐시에 안전하게 최적화 탑재되었습니다!`);
                                }
                            });
                        };
                        reader.readAsDataURL(file);
                    });
                } else {
                    fileCountIndicator.textContent = "선택된 파일 없음";
                }
            });

            const toggleEditBtn = document.getElementById("toggle-photo-editor-btn");
            const sidePanel = document.getElementById("photo-editor-panel");
            const btnText = document.getElementById("photo-editor-btn-text");

            toggleEditBtn.addEventListener("click", () => {
                const hiddenStatus = sidePanel.classList.contains("hidden");
                if (hiddenStatus) {
                    sidePanel.classList.remove("hidden");
                    btnText.textContent = "편집 패널 숨기기";
                } else {
                    sidePanel.classList.add("hidden");
                    btnText.textContent = "편집 패널 보이기";
                }
            });

            document.getElementById("export-photo-md-btn").addEventListener("click", exportPhotoDiaryToMarkdown);
        }

        function renderPhotoArchive() {
            const grid = document.getElementById("photo-deck-grid");
            const editorList = document.getElementById("photo-editor-list-container");
            const totalCount = document.getElementById("photo-count-badge");

            grid.innerHTML = "";
            editorList.innerHTML = "";

            const filtered = photoSelectedCategory === "ALL" 
                ? photosData 
                : photosData.filter(p => p.category === photoSelectedCategory);

            totalCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 flex flex-col items-center justify-center text-center text-slate-500 space-y-4">
                        <div class="p-4 bg-slate-900 rounded-full border border-slate-800">
                            <i data-lucide="image" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold">보관함 슬롯이 비어 있습니다.</p>
                            <p class="text-[10px] text-slate-600 mt-1">왼쪽 '편집 패널 보이기' 단추를 활용하여 나만의 첫 카드를 추가하세요.</p>
                        </div>
                    </div>
                `;
            } else {
                filtered.forEach((ph, idx) => {
                    const wrap = document.createElement("div");
                    const isOpened = photoActiveSlideId === ph.id;
                    
                    // 펼쳐진 상태일 때는 세로 크기 제약 없이 유연하게 늘어나도록 설정
                    wrap.className = `perspective-container relative w-full flex items-end justify-center group mt-4 transition-all duration-500 ${
                        isOpened ? 'h-[520px]' : 'h-[360px]'
                    }`;
                    
                    // 등록된 이미지 배열 (이전 단일 데이터와의 하위 호환성 확보)
                    const imageList = ph.imgUrls || [ph.imgUrl];
                    
                    // 저장 시점에 고정해둔 랜덤 미리보기용 index 호출 (없으면 0번째)
                    const previewIdx = ph.previewIndex !== undefined ? ph.previewIndex : 0;
                    const previewImage = imageList[previewIdx] || imageList[0] || "https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800";

                    // 그룹화된 사진 썸네일 그리드 HTML 구성 (펼침 시 노출)
                    let subImagesGridHtml = "";
                    if (isOpened && imageList.length > 1) {
                        subImagesGridHtml = `
                            <div class="mt-2 pt-2 border-t border-slate-200">
                                <p class="text-[8px] text-slate-450 font-bold mb-1 uppercase tracking-wider flex items-center gap-1">
                                    <i data-lucide="images" class="w-3 h-3 text-sky-500"></i> 전체 사진 컬렉션 (${imageList.length}장)
                                </p>
                                <div class="grid grid-cols-4 gap-1 max-h-[110px] overflow-y-auto pr-0.5">
                                    ${imageList.map((img, i) => `
                                        <div class="relative aspect-square rounded-md overflow-hidden bg-slate-100 border border-slate-200/60 cursor-pointer group/item" onclick="openLightbox('${img.replace(/'/g, "\\'")}', event)">
                                            <img src="${img}" class="w-full h-full object-cover transition-transform group-hover/item:scale-110" onerror="this.src='https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800'">
                                            <div class="absolute inset-0 bg-black/0 hover:bg-black/20 flex items-center justify-center transition-colors">
                                                <i data-lucide="zoom-in" class="w-3 h-3 text-white opacity-0 hover:opacity-100 transition-opacity"></i>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }

                    // 사진 수가 여러 개일 때 장수 태그
                    const badgeHtml = imageList.length > 1 
                        ? `<span class="absolute top-2 left-2 px-1.5 py-0.5 bg-sky-500 text-slate-950 font-bold text-[8px] rounded backdrop-blur-sm border border-sky-400/20 tracking-wider uppercase flex items-center gap-1 shadow-md z-10"><i data-lucide="layers" class="w-2.5 h-2.5"></i> +${imageList.length}</span>`
                        : '';

                    wrap.innerHTML = `
                        <div class="absolute bottom-0 w-full h-[220px] bg-slate-950 rounded-2xl shadow-inner z-0 border border-slate-800/60"></div>

                        <div id="polaroid-${ph.id}" 
                             onclick="togglePhotoSlideTrigger(${ph.id})"
                             class="absolute w-[91%] max-w-full bg-white text-slate-900 rounded-xl shadow-lg p-3 flex flex-col justify-between transition-all duration-500 ease-out z-10 cursor-pointer ${
                                 isOpened 
                                 ? '-translate-y-[210px] scale-105 z-30 rotate-[2deg] shadow-2xl ring-4 ring-sky-400/40 h-[460px]' 
                                 : 'translate-y-4 group-hover:translate-y-[-12px] group-hover:rotate-[-1.5deg] rotate-0 h-[300px]'
                             }">
                            
                            <!-- 메인 이미지 파트 -->
                            <div class="w-full h-[58%] bg-slate-100 rounded-lg overflow-hidden relative shadow-inner">
                                ${badgeHtml}
                                <img src="${previewImage}" alt="${ph.title}" class="w-full h-full object-cover select-none pointer-events-none" onerror="this.src='https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800'">
                                <span class="absolute top-2 right-2 px-1.5 py-0.5 bg-slate-950/80 text-white font-mono text-[8px] rounded backdrop-blur-sm border border-white/10 tracking-widest uppercase">${ph.category}</span>
                            </div>

                            <div class="flex-1 flex flex-col justify-between pt-2 overflow-hidden">
                                <div class="flex items-start justify-between gap-1">
                                    <h4 class="font-bold text-xs text-slate-900 truncate leading-tight">${ph.title}</h4>
                                    <span class="text-[8px] text-slate-400 font-mono flex-shrink-0">${ph.date}</span>
                                </div>
                                
                                <div class="relative flex-1 ${isOpened ? 'block' : 'hidden'} overflow-y-auto mt-1 pr-1 border-t border-slate-100 pt-1">
                                    <p class="handwritten-font text-[10px] text-slate-700 leading-relaxed font-semibold whitespace-pre-wrap">${ph.desc}</p>
                                    
                                    <!-- 여러 장일 때의 사진 묶음 노출 공간 -->
                                    ${subImagesGridHtml}
                                </div>

                                <div class="flex items-center justify-between text-[8px] text-slate-450 mt-auto border-t border-slate-100/50 pt-1 ${isOpened ? 'hidden' : 'flex'}">
                                    <span class="flex items-center gap-1">
                                        <i data-lucide="map-pin" class="w-2.5 h-2.5 text-sky-500"></i> ${ph.location}
                                    </span>
                                    <span class="text-[7.5px] tracking-wider font-mono text-sky-600 font-extrabold uppercase flex items-center gap-0.5">
                                        ${imageList.length > 1 ? '<i data-lucide="folder" class="w-2.5 h-2.5"></i> ALBUM OPEN' : 'CLICK TO OPEN'}
                                    </span>
                                </div>

                                <div class="items-center justify-between text-[8px] text-slate-450 mt-auto border-t border-slate-100 pt-1 ${isOpened ? 'flex' : 'hidden'}">
                                    <span class="flex items-center gap-1">
                                        <i data-lucide="map-pin" class="w-2.5 h-2.5 text-sky-500"></i> ${ph.location}
                                    </span>
                                    <span class="text-[7.5px] font-mono text-rose-500 font-bold flex items-center gap-0.5">
                                        <i data-lucide="chevron-down" class="w-2.5 h-2.5 animate-bounce"></i> CLOSE
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="absolute bottom-0 w-full h-[180px] bg-gradient-to-b from-slate-900 via-slate-950 to-black rounded-b-2xl rounded-t-md shadow-2xl z-20 border-t border-slate-800/80 flex flex-col justify-between p-4 cursor-pointer select-none overflow-hidden"
                             onclick="togglePhotoSlideTrigger(${ph.id})">
                            
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-7 bg-slate-950 rounded-b-full border-b border-slate-800/40 z-30"></div>
                            
                            <div class="space-y-1 relative z-10 pt-2">
                                <span class="text-[8px] font-mono tracking-widest text-sky-400/80 font-bold">SLOT 0${idx + 1}</span>
                                <h3 class="text-xs font-bold text-white tracking-tight truncate">${ph.title}</h3>
                            </div>

                            <div class="border-t border-dashed border-slate-800 pt-2 flex justify-between items-center text-slate-500 relative z-10">
                                <span class="text-[8px] font-mono uppercase">${ph.category} ARCHIVE</span>
                                <div class="flex items-center gap-1">
                                    <i data-lucide="folder-closed" class="w-3.5 h-3.5 ${isOpened ? 'hidden' : 'block'}"></i>
                                    <i data-lucide="folder-open" class="w-3.5 h-3.5 text-sky-400 ${isOpened ? 'block' : 'hidden'} animate-pulse"></i>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(wrap);
                });
            }

            renderPhotoFilterBarUI();

            photosData.forEach(ph => {
                const imageList = ph.imgUrls || [ph.imgUrl];
                const previewIdx = ph.previewIndex !== undefined ? ph.previewIndex : 0;
                const previewImg = imageList[previewIdx] || imageList[0] || "https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800";
                
                const subCard = document.createElement("div");
                subCard.className = "flex items-center gap-3 bg-slate-955 p-2 rounded-xl border border-slate-850/80 hover:border-slate-800 transition-colors";
                subCard.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-slate-900 overflow-hidden flex-shrink-0 border border-slate-800 relative">
                        <img src="${previewImg}" alt="" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800'">
                        ${imageList.length > 1 ? `<span class="absolute bottom-0 right-0 bg-sky-500 text-slate-950 font-extrabold text-[7px] px-0.5 rounded-tl">${imageList.length}</span>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h5 class="text-[11px] font-bold text-white truncate">${ph.title}</h5>
                        <p class="text-[9px] text-slate-400 truncate mt-0.5">${ph.location} | ${ph.date}</p>
                    </div>
                    <button onclick="removePhotoCard(${ph.id})" class="p-1.5 bg-slate-900 hover:bg-rose-950/40 text-slate-500 hover:text-rose-400 rounded-lg transition-colors border border-slate-800 flex-shrink-0">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                editorList.appendChild(subCard);
            });

            lucide.createIcons();
        }

        function renderPhotoFilterBarUI() {
            const bar = document.getElementById("photo-category-filter-bar");
            bar.innerHTML = "";

            const categories = ["ALL", ...new Set(photosData.map(p => p.category))];

            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `px-2.5 py-1 text-[9px] sm:text-[10px] font-bold rounded-lg transition-all border ${
                    photoSelectedCategory === cat 
                    ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-lg shadow-sky-500/10' 
                    : 'bg-slate-955 hover:bg-slate-900 text-slate-400 border-slate-800'
                }`;
                btn.textContent = cat === "ALL" ? "모두 감상" : cat;
                btn.onclick = () => {
                    photoSelectedCategory = cat;
                    photoActiveSlideId = null;
                    renderPhotoArchive();
                };
                bar.appendChild(btn);
            });
        }

        function togglePhotoSlideTrigger(id) {
            if (photoActiveSlideId === id) {
                photoActiveSlideId = null;
            } else {
                photoActiveSlideId = id;
            }
            renderPhotoArchive();
        }

        function openLightbox(url, event) {
            if (event) {
                event.stopPropagation(); // 폴라로이드 닫힘 현상 방지
            }
            const lightbox = document.getElementById("image-lightbox");
            const lightboxImg = document.getElementById("lightbox-img");
            lightboxImg.src = url;
            lightbox.classList.remove("hidden");
        }

        function closeLightbox() {
            const lightbox = document.getElementById("image-lightbox");
            lightbox.classList.add("hidden");
        }

        function addNewPhotoCard() {
            const titleInput = document.getElementById("photo-add-title");
            const locationInput = document.getElementById("photo-add-location");
            const dateInput = document.getElementById("photo-add-date");
            const catSelect = document.getElementById("photo-add-category");
            const descInput = document.getElementById("photo-add-desc");
            const directUrlTextarea = document.getElementById("photo-add-imgurl");

            const title = titleInput.value.trim();
            const location = locationInput.value.trim();
            const date = dateInput.value.trim();
            const category = catSelect.value;
            const desc = descInput.value.trim();

            let finalImages = [];

            // 1. 업로드된 로컬 압축 이미지 목록 주입
            if (photoUploadedBase64List && photoUploadedBase64List.length > 0) {
                finalImages = [...photoUploadedBase64List];
            } 
            
            // 2. 수동 입력 웹 이미지 주소 수집 (쉼표 또는 줄바꿈 단위 파싱)
            if (directUrlTextarea.value.trim() !== "") {
                const urls = directUrlTextarea.value.split(/[\n,]+/).map(url => url.trim()).filter(url => url !== "");
                finalImages = [...finalImages, ...urls];
            }

            // 사진 목록이 0개일 시 가벼운 기본 일러스트 이미지 배치
            if (finalImages.length === 0) {
                finalImages.push("https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&q=80&w=800");
            }

            if (!title) {
                triggerToast("에세이 카드 추가를 하려면 '제목' 정보가 있어야 합니다.", "error");
                return;
            }

            // 대표 이미지(Preview)로 활성화할 index를 매번 무작위로 한 개 설정
            const randomPreviewIndex = Math.floor(Math.random() * finalImages.length);

            const nextId = photosData.length > 0 ? Math.max(...photosData.map(p => p.id)) + 1 : 1;
            photosData.push({
                id: nextId,
                title: title,
                date: date || new Date().toISOString().split('T')[0].replace(/-/g, '.'),
                location: location || "기억속 보금자리",
                category: category,
                desc: desc || "한 장의 소중한 순간 속에 차곡히 머금어 둔 아름다운 독백입니다.",
                imgUrls: finalImages, 
                previewIndex: randomPreviewIndex 
            });

            // 스토리지에 최종 저장
            const isSaved = saveToLocalStorage(photosData);
            if (!isSaved) {
                photosData.pop(); // 저장이 불가능할 시 메모리 롤백
                return;
            }
            
            // 폼 입력 요소 클리어
            titleInput.value = "";
            locationInput.value = "";
            dateInput.value = "";
            descInput.value = "";
            directUrlTextarea.value = "";
            photoUploadedBase64List = [];
            document.getElementById("photo-file-uploader").value = "";
            document.getElementById("file-count-indicator").textContent = "선택된 파일 없음";

            renderPhotoArchive();
            triggerToast(`📸 ${finalImages.length}개의 순간이 포함된 그룹 슬롯이 로컬 데이터베이스에 성공적으로 아카이빙되었습니다!`);
        }

        function removePhotoCard(id) {
            photosData = photosData.filter(p => p.id !== id);
            if (photoActiveSlideId === id) photoActiveSlideId = null;
            
            saveToLocalStorage(photosData);
            renderPhotoArchive();
            triggerToast("선택하신 사진 포켓 슬롯을 파기했습니다.", "error");
        }

        function exportPhotoDiaryToMarkdown() {
            let output = `# 📸 Jinu's Space - 포토 에세이 아카이브 백업 데이터\n\n`;
            output += `> **하늘빛 물감으로 가꾸어 낸 기억 저편의 실시간 아카이빙**\n>\n`;

            photosData.forEach((ph, idx) => {
                output += `## [포켓 Slot 0${idx + 1}] ${ph.title}\n\n`;
                output += `* **촬영 날짜:** ${ph.date}\n`;
                output += `* **기록 장소:** ${ph.location}\n`;
                output += `* **카테고리:** ${ph.category}\n\n`;
                
                const list = ph.imgUrls || [ph.imgUrl];
                output += `* **수록 사진 목록 (총 ${list.length}장):**\n`;
                list.forEach((img, i) => {
                    output += `  - 사진 ${i+1}: ${img}\n`;
                });
                output += `\n`;

                output += `### 📝 일기 에세이 수록글\n`;
                output += `> ${ph.desc}\n\n`;
                output += `---\n\n`;
            });

            const blob = new Blob([output], { type: "text/markdown;charset=utf-8;" });
            const downLink = document.createElement("a");
            downLink.href = URL.createObjectURL(blob);
            downLink.setAttribute("download", `jinu_photo_essay_backup.md`);
            document.body.appendChild(downLink);
            downLink.click();
            document.body.removeChild(downLink);
            
            triggerToast("포토 에세이가 마크다운(.md) 파일 형태로 추출되었습니다! 💾");
        }

        // Toast Helper
        function triggerToast(msg, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `flex items-center gap-2.5 px-3.5 py-3 rounded-xl shadow-2xl border text-xs font-semibold transition-all transform translate-y-2 opacity-0 pointer-events-auto max-w-[90%] sm:max-w-sm ${
                type === 'error' 
                ? 'bg-rose-950 text-rose-200 border-rose-900/60' 
                : 'bg-slate-900 text-sky-450 border-slate-800'
            }`;
            
            const symbol = type === 'error' ? 'alert-circle' : 'check-circle';
            toast.innerHTML = `
                <i data-lucide="${symbol}" class="w-4 h-4 flex-shrink-0 ${type === 'error' ? 'text-rose-400' : 'text-sky-400'}"></i>
                <span class="flex-1">${msg}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove("translate-y-2", "opacity-0");
            }, 50);

            setTimeout(() => {
                toast.classList.add("translate-y-2", "opacity-0");
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }
    </script>
</body>
</html>
